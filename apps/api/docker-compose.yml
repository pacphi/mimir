# Docker Compose configuration for Sindri
# Generated by sindri CLI - do not edit manually
# DinD Mode: none

services:
  sindri:
    image: sindri:latest
    container_name: sindri-dev01

    volumes:
      - sindri-dev01_home:/alt/home/developer

    env_file:
      - .env.secrets

    environment:
      - INIT_WORKSPACE=true
      - INSTALL_PROFILE=anthropic-dev

      - ADDITIONAL_EXTENSIONS=agent-browser,agent-manager,agent-skills-cli,agentic-qe,ai-toolkit,claude-cli,claude-marketplace,claudish,cloud-tools,compahook,golang,infra-tools,jvm,kilo,linear-mcp,mdflow,nodejs-devtools,notebooklm-mcp-cli,ollama,openskills,pal-mcp-server,playwright,ralph,ruflo,rust,ruvector-cli,ruvnet-research,rvf-cli,supabase-cli,tmux-workspace

      - SKIP_AUTO_INSTALL=false

    deploy:
      resources:
        limits:
          memory: 8GB
          cpus: "4"

    # Standard mode (no DinD): allow sudo for extension installation
    # Security note: no-new-privileges only applied in socket mode
    # when sharing Docker daemon with host (production-like security)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:size=2G,mode=1777,noexec,nosuid,nodev

    stdin_open: true
    tty: true

volumes:
  sindri-dev01_home:
    driver: local
